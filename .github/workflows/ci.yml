name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent-core

      - name: Run cargo test
        run: cargo test

  rust-persistence-integration:
    name: Rust Persistence Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent-core
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: teamsagent
          POSTGRES_USER: teamsagent
          POSTGRES_PASSWORD: teamsagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teamsagent -d teamsagent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://teamsagent:teamsagent@127.0.0.1:5432/teamsagent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent-core

      - name: Run persistence integration test
        run: cargo test --test persistence_integration_tests

  typescript-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/teams-adapter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/teams-adapter/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3

      - name: Enforce pnpm-only lockfiles
        run: test ! -f apps/teams-adapter/package-lock.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm test
